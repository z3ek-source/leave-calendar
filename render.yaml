services:
  - type: web
    name: leave-calendar
    runtime: python
    plan: starter
    buildCommand: ""
    startCommand: python3 outputs/leave-calendar-server.py
    envVars:
      - key: DATA_DIR
        value: /var/data
    disk:
      name: leave-calendar-data
      mountPath: /var/data
      sizeGB: 1
